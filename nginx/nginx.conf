worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Note: swf and wasm types are already in default mime.types

    sendfile   on;
    tcp_nopush on;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/xml
        text/css
        text/plain;

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen      80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ── CORS headers (Ruffle loads SWFs via fetch/XHR) ───────────
        add_header Access-Control-Allow-Origin   "*" always;
        add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers  "Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # ── Cache static assets ──────────────────────────────────────
        location ~* \.(swf|js|wasm|css|png|jpg|gif|ico|mp3|ogg)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            # Re-add CORS — location-level add_header overrides server-level
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        }

        # ── Health check ─────────────────────────────────────────────
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ── No cache for client HTML ────────────────────────────────────
        location /client/ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── Proxy API calls to Dash ─────────────────────────────────────
        location /api/ {
            proxy_pass http://dash:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Web service JSON files (served from play/ subdirectory) ────
        # Client requests /en/web_service/* but files are at /play/en/web_service/*
        location ~ ^/(en|es|fr|pt)/web_service/(.*)$ {
            alias /usr/share/nginx/html/play/$1/web_service/$2;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location ~ ^/web_service/(.*)$ {
            alias /usr/share/nginx/html/play/web_service/$1;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── Default: serve files ─────────────────────────────────────
        location / {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  "*";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Allow-Headers "Range";
                add_header Access-Control-Max-Age       86400;
                return 204;
            }
            try_files $uri $uri/ =404;
        }
    }
}
