# Club Penguin Yukon + Discord Bridge — Docker Compose
# Usage: docker-compose up -d
# Requires: .env file (copy from .env.example)

services:

  # ── Database (MySQL for Yukon) ────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${MYSQL_USER:-penguin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yukon}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./yukon-server/yukon.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - clubpenguin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Yukon Server (Login + World) ──────────────────────────────────────
  yukon-server:
    build: ./yukon-server
    restart: unless-stopped
    env_file: .env
    ports:
      - "${GAME_LOGIN_PORT:-6112}:6112"
      - "${GAME_WORLD_PORT:-6113}:6113"
    environment:
      BOT_API_HOST: discord-bot
      BOT_API_PORT: ${BOT_API_PORT:-3001}
    volumes:
      - ./yukon-server/config:/app/config:ro
    networks:
      - clubpenguin
    depends_on:
      mysql:
        condition: service_healthy
      discord-bot:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6112 && nc -z localhost 6113 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Yukon HTML5 Client (nginx) ────────────────────────────────────────
  yukon-client:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${MEDIA_PORT:-80}:80"
    volumes:
      - ./yukon/dist:/usr/share/nginx/html:ro
      - ./nginx/yukon-client.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - clubpenguin
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Media Server (nginx) ────────────────────────────────────────────
  media-server:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./media:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - clubpenguin
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Discord Bot ─────────────────────────────────────────────────────
  discord-bot:
    build: ./discord-bot
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-penguin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yukon}
    ports:
      - "${BOT_API_PORT:-3001}:${BOT_API_PORT:-3001}"
    networks:
      - clubpenguin
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${BOT_API_PORT:-3001}/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  mysql-data:

networks:
  clubpenguin:
    driver: bridge
