<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Penguin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>

    <script>
        // ── Game Configuration ──────────────────────────────────────────
        // Edit these values to match your server setup.
        const GAME_CONFIG = {
            // Server hostname (defaults to the host serving this page)
            host: window.location.hostname,

            // Houdini server ports
            loginPort: 6112,
            worldPort: 6113,

            // WebSocket proxy ports (websockify or similar, bridging WS → TCP)
            // These must point to a WebSocket proxy forwarding to the Houdini ports above.
            wsLoginPort: 7112,
            wsWorldPort: 7113,

            // Path to the AS2 client boot SWF
            swfPath: "/play/v2/client/load.swf",
        };

        // ── Ruffle Setup ────────────────────────────────────────────────
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            autoplay: "on",
            unmuteOverlay: "hidden",
            logLevel: "debug",
            socketProxy: [
                // Intercept connections to window.location.hostname
                {
                    host: GAME_CONFIG.host,
                    port: GAME_CONFIG.loginPort,
                    proxyUrl: "wss://" + GAME_CONFIG.host + "/ws-login",
                },
                {
                    host: GAME_CONFIG.host,
                    port: GAME_CONFIG.worldPort,
                    proxyUrl: "wss://" + GAME_CONFIG.host + "/ws-world",
                },
                // Also intercept connections to 127.0.0.1 (servers.xml uses this)
                {
                    host: "127.0.0.1",
                    port: GAME_CONFIG.loginPort,
                    proxyUrl: "wss://" + GAME_CONFIG.host + "/ws-login",
                },
                {
                    host: "127.0.0.1",
                    port: GAME_CONFIG.worldPort,
                    proxyUrl: "wss://" + GAME_CONFIG.host + "/ws-world",
                },
            ],
        };
    </script>
    <script src="/ruffle/ruffle.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function () {
            console.log("[CP Debug] Starting Ruffle initialization...");
            console.log("[CP Debug] Config:", JSON.stringify(GAME_CONFIG, null, 2));

            const ruffle = window.RufflePlayer.newest();
            console.log("[CP Debug] Ruffle version:", ruffle);

            const player = ruffle.createPlayer();
            player.style.width = "100%";
            player.style.height = "100%";
            document.getElementById("player").appendChild(player);

            // Listen for Ruffle events
            player.addEventListener("loadedmetadata", () => {
                console.log("[CP Debug] SWF metadata loaded");
            });
            player.addEventListener("loadeddata", () => {
                console.log("[CP Debug] SWF data loaded");
            });
            player.addEventListener("error", (e) => {
                console.error("[CP Debug] Ruffle error:", e);
            });
            player.addEventListener("panic", (e) => {
                console.error("[CP Debug] Ruffle PANIC:", e);
            });

            console.log("[CP Debug] Loading SWF:", GAME_CONFIG.swfPath);

            try {
                await player.load({
                    url: GAME_CONFIG.swfPath,
                    parameters: {
                        lang: "en",
                        basePath: "/play/v2/",
                        clientPath: "/play/v2/client/",
                        contentPath: "/play/v2/content/",
                        gamesPath: "/play/v2/games/"
                    }
                });
                console.log("[CP Debug] SWF load() completed");
            } catch (err) {
                console.error("[CP Debug] SWF load() failed:", err);
            }
        });
    </script>
</body>
</html>
